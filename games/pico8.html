<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | PICO-8 Gallery</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        /* Specific tweaks for the Games page */
        
        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(640px, 1fr));
            gap: 3rem;
            margin-top: 2rem;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            height: auto; 
            min-height: 750px;
        }

        .game-info {
            width: 100%;
            margin-bottom: 15px;
            text-align: left;
        }

        .game-info h2 {
            margin: 0;
            color: var(--accent-secondary); /* PICO-8 Pink flavor */
            font-family: 'Courier New', Courier, monospace;
        }

        .game-tags {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .iframe-container {
            position: relative;
            width: 621px;
            height: 513px;
            max-width: 100%;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            border: 2px solid #222;
            margin-bottom: 20px;
        }
        .game-blurb {
            width: 100%;
            max-width: 621px;
        color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.5;
            text-align: left; 
            padding: 10px 5px;
            border-top: 1px solid var(--border-color); 
        }
        /* Responsive scaling for smaller screens */
        @media (max-width: 680px) {
            .iframe-container {
                width: 100%;
                height: auto;
                aspect-ratio: 621 / 513;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="../index.html">← Back to Home</a>
            <a href="index.html" style="color: var(--accent-primary);">Games</a>
            <a href="../projects/software.html">Software</a>
        </nav>

        <header>
            <h1>PICO-8 Gallery</h1>
            <p class="subtitle">Micro-games built with technical restrictions and LUA.</p>
        </header>

        <main class="arcade-grid">
            
            <section class="game-card">
                <div class="game-info">
                    <h2>Caroline</h2>
                    <div class="game-tags">Action • Story • 2026</div>
                </div>
                <div class="iframe-container">
                    <iframe src="https://www.lexaloffle.com/bbs/widget.php?pid=hokjijutu" 
                            allowfullscreen 
                            width="621" 
                            height="621" 
                            style="border:none; overflow:hidden"></iframe>
                    
                </div>
                <div class="game-blurb">
                    <p><strong>Controls:</strong> Arrow keys to move • X to dance • Z to see dances • P to pause</p>

                </div>
            </section>

            </main>

        <footer style="margin-top: 5rem; padding-bottom: 2rem; color: var(--text-muted); font-size: 0.9rem;">
            <p>Built with PICO-8 and hosted on GitHub Pages.</p>
        </footer>
    </div>

</body>
</html>

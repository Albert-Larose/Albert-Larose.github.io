<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Portfolio</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .construction-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
        }

        .status-code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            color: var(--accent-secondary);
            margin-bottom: 1rem;
        }

        /* Animated Loading Bar */
        .loading-bar-container {
            width: 300px;
            height: 20px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            margin: 2rem 0;
        }

        .loading-fill {
            height: 100%;
            width: 65%; /* Set the progress manually */
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .back-btn {
            margin-top: 2rem;
            padding: 10px 20px;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-dark);
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="../index.html">Home</a>
            <a href="pico8.html">PICO-8</a>
            <a href="godot.html">Godot</a>
            <a href="unity.html">Unity</a>
        </nav>

        <main class="construction-container">
            <div class="status-code">> STATUS: COMPILING_ASSETS...</div>
            <h1>Under Development</h1>
            <p class="subtitle">I'm currently assembling code examples. Check back soon!</p>
            
            <div class="loading-bar-container">
                <div class="loading-fill"></div>
            </div>

            <a href="../index.html" class="back-btn">Return to Hub</a>
        </main>
    </div>

</body>
</html>
